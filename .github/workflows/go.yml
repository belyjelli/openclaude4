name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify module
        run: go mod verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.9.0

      - name: Build
        run: go build -ldflags "-X main.version=ci -X main.commit=$GITHUB_SHA" -o openclaude ./cmd/openclaude

      - name: Vet
        run: go vet ./...

      # Bubblewrap is required for bash v2 sandbox integration tests (internal/bashv2/bwrap_linux_test.go).
      - name: Install bubblewrap
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bubblewrap
          command -v bwrap

      - name: Test
        run: go test ./...
